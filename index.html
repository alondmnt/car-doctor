<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Car Doctor: Fix Cars, Robots, Spaceships &amp; Planets</title>
  <meta name="description" content="A free repair game for kids — fix cars, build robots, launch spaceships, and heal planets. Tap, drag, and explore 30+ faults across 4 vehicle types. No ads, no sign-up.">
  <link rel="canonical" href="https://alondmnt.com/car-doctor/">

  <!-- Open Graph (social sharing) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Car Doctor: Fix Cars, Robots, Spaceships &amp; Planets">
  <meta property="og:description" content="A free repair game for kids — fix cars, build robots, launch spaceships, and heal planets. No ads, no sign-up.">
  <meta property="og:url" content="https://alondmnt.com/car-doctor/">

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Car Doctor",
    "url": "https://alondmnt.com/car-doctor/",
    "description": "A free repair game for kids — fix cars, build robots, launch spaceships, and heal planets.",
    "applicationCategory": "GameApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "audience": { "@type": "PeopleAudience", "suggestedMinAge": "3", "suggestedMaxAge": "8" }
  }
  </script>

  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&display=swap" rel="stylesheet">
</head>
<body>

  <noscript>
    <h1>Car Doctor: Fix Cars, Robots, Spaceships &amp; Planets</h1>
    <p>A free browser game for kids. Use tools to repair cars, build robots, launch spaceships, and heal planets. Over 30 faults to discover across 4 vehicle types. No ads, no sign-up — just tap and play.</p>
  </noscript>

  <!-- Tap-to-start splash (satisfies autoplay policy) -->
  <div id="splash" class="splash">
    <div class="splash__content">
      <div class="splash__icon">🔧</div>
      <div class="splash__title">Car Doctor</div>
    </div>
  </div>

  <!-- Reset button -->
  <button id="reset-btn" aria-label="Reset">↻</button>
  <!-- Hint toggle -->
  <button id="hint-btn" aria-label="Toggle hints">💡</button>
  <!-- Sound toggle -->
  <button id="sound-btn" aria-label="Toggle sound">🔊</button>

  <!-- Coin jar -->
  <div id="coin-jar">
    <div id="coin-jar-fill"></div>
    <div id="coin-jar-count">0</div>
  </div>

  <!-- Unlock preview (below coin jar) -->
  <div id="unlock-preview"></div>

  <!-- Unlock fanfare overlay -->
  <div id="unlock-fanfare">
    <div class="unlock-fanfare__content">
      <div class="unlock-fanfare__icon"></div>
      <div class="unlock-fanfare__label"></div>
      <div class="unlock-fanfare__fireworks"></div>
    </div>
  </div>

  <!-- Parts shelf -->
  <div id="warehouse"></div>

  <!-- Toolbox -->
  <div id="toolbox">
    <div class="toolbox__tool" data-tool="drill">🔩</div>
    <div class="toolbox__tool" data-tool="wrench">🔧</div>
    <div class="toolbox__tool" data-tool="jack">🏗️</div>
    <div class="toolbox__tool" data-tool="hand">✋</div>
    <div class="toolbox__tool" data-tool="spray">🎨</div>
    <div class="toolbox__tool" data-tool="hose">🚿</div>
  </div>

  <!-- Game area -->
  <div id="garage">
    <div class="garage-decor garage-decor--pegboard" aria-hidden="true"></div>
    <div class="garage-decor garage-decor--floor-marks" aria-hidden="true"></div>
    <div class="garage-decor garage-decor--lamp" aria-hidden="true"></div>
    <div class="garage-decor garage-decor--door-frame" aria-hidden="true"></div>
    <div class="garage-decor garage-decor--parts-shelf" aria-hidden="true"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/game-state.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/drag.js"></script>
  <script src="js/vehicle.js"></script>
  <script src="js/repair-templates.js"></script>
  <script src="js/car.js"></script>
  <script src="js/robot.js"></script>
  <script src="js/spaceship.js"></script>
  <script src="js/repair.js"></script>
  <script src="js/robot-repair.js"></script>
  <script src="js/spaceship-repair.js"></script>
  <script src="js/planet.js"></script>
  <script src="js/planet-repair.js"></script>
  <script src="js/fault-registry.js"></script>
  <script src="js/picker.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
